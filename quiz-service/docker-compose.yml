services:
  quiz-service:
    build: .
    ports:
      - "8080:8000"
    volumes:
      - quiz-data:/data
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - QUIZ_CONFIG_PATH=/data/config.json
      - QUIZ_AUDIO_DIR=/data/audio
      - PIPER_MODELS_DIR=/data/models
    restart: unless-stopped

volumes:
  quiz-data:
